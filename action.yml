name: "LeastPrivilegedMSGraph Audit"
description: "Audits MS Graph permissions vs actual usage using Log Analytics"
branding:
  icon: "shield"
  color: "blue"

inputs:
  logAnalyticsWorkspaceId:
    description: "Azure Log Analytics Workspace ID"
    required: true
  daysToQuery:
    description: "Number of days to analyze"
    default: "7"
  enableGitCommit:
    description: "Commit JSON/CliXml state back to repo"
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Run Audit Logic
      shell: pwsh
      run: |
        & "${{ github.action_path }}/entrypoint.ps1" `
          -WorkspaceId "${{ inputs.logAnalyticsWorkspaceId }}" `
          -Days ${{ inputs.daysToQuery }} `
          -DoCommit "${{ inputs.enableGitCommit }}"
